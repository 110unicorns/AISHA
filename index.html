<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha DJ - Multi-Deck Void</title>
    <style>
        /* Estética oscura y limpia para el rack de sonido */
        body {
            background-color: #080808;
            color: #c0c0c0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 10px;
            margin: 0 0 10px 0;
            color: #ffffff;
            font-weight: normal;
        }

        .sub {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #444444;
            text-transform: uppercase;
        }

        /* Rejilla para organizar las ventanas de las playlists */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .deck {
            background: #111111;
            border: 1px solid #222222;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border-radius: 4px;
        }

        .deck-title {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #666666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>AISHA // MULTI-DECK</h1>
        <div class="sub">Distrito 110 — Trip Hop & Ambient Racks</div>
    </header>

    <div class="grid-container">

        <div class="deck">
            <div class="deck-title">[ DECK_01 // TRIP HOP SELECTION ]</div>
            <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/40899216&color=%231a1a1a&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="deck">
            <div class="deck-title">[ DECK_02 // AMBIENT & LO-FI ]</div>
            <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/1148404285&color=%231a1a1a&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="deck">
            <div class="deck-title">[ DECK_03 // LOCAL: LOOP PULLS ]</div>
            <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/1495914616&color=%231a1a1a&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <div class="deck">
            <div class="deck-title">[ DECK_04 // DOWNTEMPO VOID ]</div>
            <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/272782761&color=%231a1a1a&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

    </div>

</body>
</html>
