<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA // LOOP PULLS</title>
    <style>
        /* Estilos Base - Estética Ciber-Orgánica y Retro-Futurista */
        body {
            background-color: #0d0f12;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.5rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            font-weight: 300;
            text-align: center;
        }

        /* Rejilla de 4 Cuadrantes */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* Tarjetas contenedoras para los reproductores */
        .card {
            background-color: #ffffff;
            border-radius: 4px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        /* Ajustes responsivos para pantallas más pequeñas */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
                letter-spacing: 0.3rem;
            }
        }
    </style>
</head>
<body>

    <h1>AISHA // LOOP PULLS</h1>

    <div class="grid-container">

        <!-- Cuadrante 1: Trip Hop / Nu-Funk / Acid Jazz -->
        <div class="card">
            <iframe width="100%" height="450" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/35122270&color=%23ab2fbf&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true"></iframe>
        </div>

        <!-- Cuadrante 2: Triphop Mix -->

        </div>

        <!-- Cuadrante 3: late trip night hop -->

</body>
</html>
