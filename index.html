<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha DJ | Distrito 110</title>
    <style>
        :root {
            --bg-color: #000000; /* Fondo negro absoluto */
            --card-bg: #0a0f14;   /* Tarjetas oscuras ciber-orgánicas */
            --text-color: #c5c6c7;
            --main-accent: #66fcf1; /* Azul Cyberpunk */
            --hal-red: #ff1a1a;     /* El ojo de HAL 9000 */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor de la interfaz de HAL 9000 */
        .hal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            background: linear-gradient(180deg, #151515, #080808);
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #222;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        }

        /* El ojo físico de HAL 9000 en CSS Puro */
        .hal-eye {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, 
                #ffffff 0%, 
                #ffff00 10%, 
                var(--hal-red) 30%, 
                #660000 70%, 
                #000000 90%);
            border-radius: 50%;
            border: 8px solid #333;
            box-shadow: 0 0 40px rgba(255, 26, 26, 0.8), 
                        inset 0 0 15px rgba(0, 0, 0, 0.8);
            position: relative;
            margin-bottom: 15px;
        }

        /* Reflejo de cristal de la lente */
        .hal-eye::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 15px;
            width: 30px;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: rotate(-15px);
        }

        h1 {
            color: #ffffff;
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        h1 span {
            color: var(--main-accent);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        /* Grid de reproducción de Playlists */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .playlist-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid #11151c;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .playlist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 252, 241, 0.15);
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #05080c, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            position: relative;
            border-bottom: 1px solid #11151c;
        }

        .quadrant-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(102, 252, 241, 0.2);
        }

        .playlist-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .playlist-title {
            color: #ffffff;
            margin: 0 0 8px 0;
            font-size: 1.3rem;
        }

        .playlist-desc {
            font-size: 0.9rem;
            color: #8f9296;
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        .btn-open {
            display: block;
            background-color: transparent;
            padding: 10px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Panel Central HAL 9000 // AISHA DJ -->
    <div class="hal-container">
        <div class="hal-eye"></div>
        <h1>Aisha <span>DJ</span></h1>
        <p class="subtitle">Ecosistema Distrito 110</p>
    </div>

    <!-- El contenedor donde se inyectan las playlists desde el repositorio -->
    <div class="grid-container" id="playlists-grid"></div>

    <!-- ENLACE RELATIVO AL REPOSITORIO DE PLAYLISTS -->
    <!-- Si la carpeta de Aisha y la de playlists están al mismo nivel en la raíz: -->
    <script src="../playlists/script.js"></script>
    
    <!-- NOTA: Si están en carpetas diferentes o te da un fallo de carga, 
         puedes cambiar la línea de arriba por la ruta absoluta de tu servidor local, así:
         <script src="/repositorios/playlist/script.js"></script> 
    -->
</body>
</html>
