<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha DJ | Distrito 110</title>
    <style>
        :root {
            --bg-color: #000000; /* Fondo negro absoluto */
            --card-bg: #0a0f14;   /* Tarjetas oscuras ciber-orgánicas */
            --text-color: #c5c6c7;
            --main-accent: #66fcf1; /* Azul Cyberpunk */
            --hal-red: #ff1a1a;     /* El ojo de HAL 9000 */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor de la interfaz de HAL 9000 */
        .hal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            background: linear-gradient(180deg, #151515, #080808);
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #222;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        }

        /* El ojo físico de HAL 9000 en CSS Puro */
        .hal-eye {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #ffffff 0%, #ffff00 10%, var(--hal-red) 30%, #660000 70%, #000000 90%);
            border-radius: 50%;
            border: 8px solid #333;
            box-shadow: 0 0 40px rgba(255, 26, 26, 0.8), inset 0 0 15px rgba(0, 0, 0, 0.8);
            position: relative;
            margin-bottom: 15px;
        }

        .hal-eye::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 15px;
            width: 30px;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: rotate(-15px);
        }

        h1 {
            color: #ffffff;
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        h1 span {
            color: var(--main-accent);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        /* Contenedor en lista vertical de rectángulos grandes */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        /* Tarjeta en formato rectángulo horizontal */
        .playlist-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid #11151c;
            display: flex;
            flex-direction: row;
            height: 160px;
        }

        .playlist-card:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 25px rgba(102, 252, 241, 0.15);
        }

        /* Contenedor de la foto de portada */
        .cover-art-container {
            width: 240px;
            height: 100%;
            position: relative;
            flex-shrink: 0;
        }

        .cover-art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quadrant-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(102, 252, 241, 0.2);
            z-index: 2;
        }

        /* Zona de información lateral */
        .playlist-info {
            padding: 20px 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .text-group {
            flex-grow: 1;
        }

        .playlist-title {
            color: #ffffff;
            margin: 0 0 8px 0;
            font-size: 1.4rem;
        }

        .playlist-desc {
            font-size: 0.95rem;
            color: #8f9296;
            margin: 0;
            line-height: 1.4;
        }

        .btn-open {
            background-color: transparent;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        /* Responsivo para pantallas pequeñas */
        @media (max-width: 650px) {
            .playlist-card {
                flex-direction: column;
                height: auto;
            }
            .cover-art-container {
                width: 100%;
                height: 180px;
            }
            .playlist-info {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn-open {
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="hal-container">
        <div class="hal-eye"></div>
        <h1>Aisha <span>DJ</span></h1>
        <p class="subtitle">Ecosistema Distrito 110</p>
    </div>

    <div class="list-container" id="playlist-grid"></div>

    <script>
        // Estructura definitiva con tus 4 canales de música operativos
        const playlistData = {
          "playlists": [
            {
              "id": "playlist_001",
              "title": "Trip Hop Ambient Set",
              "quadrant": "Agua-Azul",
              "description": "Sesión inmersiva de Trip Hop y frecuencias ambientales para el entorno soberano.",
              "image_url": "https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600&auto=format&fit=crop", 
              "accent_color": "#66fcf1",
              "url": "https://soundcloud.com/user-109850132/sets/triphop?si=4f62f8d31a9542a087e8c2e23547d683&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing"
            },
            {
              "id": "playlist_002",
              "title": "Late Night Trip Hop",
              "quadrant": "Agua-Azul",
              "description": "Frecuencias y ritmos nocturnos para sesiones prolongadas de desarrollo.",
              "image_url": "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=600&auto=format&fit=crop",
              "accent_color": "#66fcf1",
              "url": "https://soundcloud.com/fraze1/sets/late-trip-night-hop?si=db7ea0336ca545b8b76d26afce403ee6&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing"
            },
            {
              "id": "playlist_003",
              "title": "Latin DJ Personal Set",
              "quadrant": "Agua-Azul",
              "description": "Set personal de mezcla (110-130 BPM). Incluye tracks de Farruko, Tiësto y Daddy Yankee.",
              "image_url": "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=600&auto=format&fit=crop",
              "accent_color": "#66fcf1",
              "url": "https://music.youtube.com/playlist?list=PLfH6E8CyLWtyZtkoOu73T2RNcVSTmFRGx"
            }
          ]
        };

        function renderPlaylists() {
            const grid = document.getElementById('playlist-grid');
            if (!grid) return;
            grid.innerHTML = '';

            playlistData.playlists.forEach(playlist => {
                const card = document.createElement('div');
                card.className = 'playlist-card';
                
                card.addEventListener('mouseenter', () => {
                    card.style.borderColor = playlist.accent_color;
                    card.style.boxShadow = `0 10px 20px ${playlist.accent_color}1e`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.borderColor = 'transparent';
                    card.style.boxShadow = 'none';
                });

                card.innerHTML = `
                    <div class="cover-art-container">
                        <span class="quadrant-tag" style="color: ${playlist.accent_color}; border-color: ${playlist.accent_color}44;">
                            ${playlist.quadrant}
                        </span>
                        <img class="cover-art-img" src="${playlist.image_url}" alt="${playlist.title}">
                    </div>
                    <div class="playlist-info">
                        <div class="text-group">
                            <h3 class="playlist-title">${playlist.title}</h3>
                            <p class="playlist-desc">${playlist.description}</p>
                        </div>
                        <a href="${playlist.url}" target="_blank" class="btn-open" style="color: ${playlist.accent_color}; border: 2px solid ${playlist.accent_color};">
                            Abrir Canal
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', renderPlaylists);
    </script>
</body>
</html>
